# Supabase Local Development Configuration
# https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
port = 54327
vector_port = 54328

# Database Linting & Testing Extensions
# NOTE: the `[db.extensions]` table is not accepted by the current Supabase CLI
# (2.x rejects it: "'db' has invalid keys: extensions"), which broke
# `supabase db start` in CI. These are dev-only test extensions, not required by
# migrations or type generation, so they're disabled here. If a future CLI
# reintroduces the table, re-enable under the supported shape.
# [db.extensions]
# plpgsql_check = "1.2.3"  # static analysis for PL/pgSQL
# pgtap = "1.3.1"          # PostgreSQL unit-testing framework
