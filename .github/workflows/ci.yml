name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only token: CI only checks out and runs the toolchain.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Build reads NEXT_PUBLIC_* lazily (inside functions), but provide safe
    # placeholders so nothing trips on a missing var. No real secrets needed.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder
      GOOGLE_MAPS_API_KEY: placeholder
      RESEND_API_KEY: re_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Stylelint
        run: pnpm lint:css

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:ci

      - name: Build
        run: pnpm build

  db-drift:
    name: DB types match migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # BLOCKING. The entangled migration lineages were squashed to a single
    # live-schema baseline (supabase/migrations/00000000000000_baseline.sql;
    # legacy files preserved in supabase/migrations_archive/), so the local
    # stack starts cleanly, and database.generated.ts was regenerated from that
    # schema. This job now fails the build if a migration changes the schema
    # without a matching `pnpm gen:types`.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Guard against a stale local stack holding the DB port (54322) — e.g. a
      # superseded run cancelled mid `db start` by cancel-in-progress can leave
      # its container behind on a non-ephemeral runner.
      - name: Clean up any stale Supabase stack
        run: |
          pnpm exec supabase stop --no-backup 2>/dev/null || true
          docker rm -f $(docker ps -aq --filter "name=supabase_") 2>/dev/null || true

      # Spin up the local Supabase stack and apply ALL migrations — this both
      # proves the migrations apply cleanly AND gives us a schema to generate
      # from. No production credentials: everything is local Docker.
      - name: Start Supabase (local) + apply migrations
        run: pnpm exec supabase db start

      - name: Check generated types match the schema
        run: pnpm gen:types:check

      # On drift, print the exact diff (committed body vs freshly generated) so
      # the mismatch is diagnosable from the run logs.
      - name: Show type drift on failure
        if: failure()
        run: |
          pnpm exec supabase gen types typescript --local --schema public \
            | pnpm exec prettier --parser typescript > /tmp/fresh.generated.ts
          echo '===== unified diff: committed (header stripped) vs fresh local ====='
          diff -u <(tail -n +6 src/types/database.generated.ts) /tmp/fresh.generated.ts || true

      - name: Stop Supabase
        if: always()
        run: pnpm exec supabase stop --no-backup || true
