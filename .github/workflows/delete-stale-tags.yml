name: One-off — delete pre-rewrite tags

# Temporary: the 2026-06-12 history rewrite (credential purge) couldn't update
# tag refs from the session environment. Dispatch once, then delete this file.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/delete-stale-tags.yml"

permissions:
  contents: write

jobs:
  delete-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete pre-rewrite tags
        run: |
          for t in v1.6 v1.7 v1.8 v1.8.1 v1.9 v2.1 v2.2; do
            git push origin ":refs/tags/$t" && echo "deleted $t" || echo "$t already gone"
          done
