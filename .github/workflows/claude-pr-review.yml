name: Claude PR Review

# Fires on every push to any PR (per directive: review every PR push).
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Least privilege the review needs: read code, write PR review comments + summary.
permissions:
  contents: read
  pull-requests: write
  issues: write

# Newer push to the same PR cancels the in-flight review (don't stack reviews).
concurrency:
  group: claude-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # Same-repo PRs get secrets; fork PRs don't. Skip on forks rather than half-run.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      # secrets can't be read in `if:` directly — fold them into an env boolean here.
      CLAUDE_AUTH_PRESENT: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' || secrets.ANTHROPIC_API_KEY != '' }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      # Max thinking budget for reviews (Claude Code reads this; "ultrathink" = 31999).
      # On Opus 4.8 thinking is adaptive — the harness maps this to max effort. Belt-and-
      # suspenders alongside the "Ultrathink." keyword in the prompt below.
      MAX_THINKING_TOKENS: "31999"
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Claude runs the review and posts its own inline + summary comments.
      # Auth: prefers CLAUDE_CODE_OAUTH_TOKEN (Max-covered, via `claude setup-token`); falls back to
      # ANTHROPIC_API_KEY. The action ignores whichever is empty.
      - name: Claude review
        if: ${{ env.CLAUDE_AUTH_PRESENT == 'true' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Ultrathink.

            You are running an automated code review of pull request
            #${{ env.PR_NUMBER }} in the repository ${{ github.repository }}.

            Follow `.github/claude-review-prompt.md` exactly — it is the full spec for severity
            calibration, what to weight, and the required output format. Do not deviate from it.

            Procedure:
              1. Read .claude/CLAUDE.md (Gotchas + Critical Notes) and .github/claude-review-prompt.md.
              2. Run `gh pr diff ${{ env.PR_NUMBER }}` and `gh pr view ${{ env.PR_NUMBER }}`.
              3. Open changed files plus their tests/callers; investigate before asserting.
              4. Post severity-tagged INLINE comments on specific lines via
                 mcp__github_inline_comment__create_inline_comment, and ONE summary comment via
                 `gh pr comment ${{ env.PR_NUMBER }} --body "..."`.

            Be direct and honest. If the code is clean, say so briefly — do not manufacture findings.
          claude_args: |
            --model ${{ vars.CLAUDE_REVIEW_MODEL || 'claude-opus-4-8' }}
            --max-turns 40
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(cat:*),Read,Grep,Glob"

      # If no Claude auth is configured yet, the run still goes green and prints what to add.
      - name: Setup checklist (Claude auth not configured)
        if: ${{ env.CLAUDE_AUTH_PRESENT != 'true' }}
        run: |
          echo "::notice title=Claude PR Review — setup incomplete::No Claude auth secret found. The review step was skipped. Add CLAUDE_CODE_OAUTH_TOKEN (preferred, Max-covered) or ANTHROPIC_API_KEY in repo Settings → Secrets and variables → Actions, then re-run."
          {
            echo "## Claude PR Review — not yet active"
            echo ""
            echo "The workflow ran, but **no Claude auth secret is configured**, so no review was posted."
            echo ""
            echo "Add **one** of these repo secrets, then push again:"
            echo "- \`CLAUDE_CODE_OAUTH_TOKEN\` — run \`claude setup-token\` locally (covered by Claude Max)."
            echo "- \`ANTHROPIC_API_KEY\` — from console.anthropic.com (billed per use)."
          } >> "$GITHUB_STEP_SUMMARY"
